<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disability Care Hub - Admin Settings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #FF6B9D 0%, #C4456F 25%, #4A69BD 55%, #6C5CE7 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      color: #fff;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .topbar {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,0.18);
      padding: 22px 0;
    }

    .brand { font-size: 30px; font-weight: 800; }
    .subtitle { color: rgba(255,255,255,0.82); font-size: 15px; margin-top: 4px; }

    .glass {
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
    }

    .btn-soft {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
      border-radius: 18px;
      padding: 12px 22px;
      transition: 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-soft:hover {
      background: rgba(255,255,255,0.22);
      color: #fff;
      transform: translateY(-2px);
    }

    .page-title { font-size: 30px; font-weight: 800; margin-bottom: 8px; }
    .page-desc { color: rgba(255,255,255,0.8); font-size: 14px; }

    .panel {
      background: rgba(255,255,255,0.96);
      color: #222;
      border-radius: 26px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .section-label {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .form-label { font-weight: 700; color: #333; }
    .form-control, .form-select {
      border-radius: 16px;
      padding: 12px 16px;
      border: 1px solid #ddd;
    }

    .save-btn {
      background: linear-gradient(135deg, #FF6B9D 0%, #C4456F 50%, #6C5CE7 100%);
      color: white;
      border: none;
      border-radius: 18px;
      padding: 14px 22px;
      font-weight: 800;
      width: 100%;
    }

    .reset-btn {
      background: linear-gradient(135deg, #FF4444 0%, #FF6B6B 100%);
      color: white;
      border: none;
      border-radius: 18px;
      padding: 14px 22px;
      font-weight: 800;
      width: 100%;
    }

    .small-note { font-size: 13px; color: #666; }
    .preview-box {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 18px;
      padding: 16px;
    }

    .lock-box {
      background: rgba(255,255,255,0.96);
      color: #222;
      border-radius: 26px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 520px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
        <div>
          <div class="brand">⚙️ Admin Settings</div>
          <div class="subtitle">Manage store settings, payment and design options</div>
        </div>
        <div class="d-flex gap-3 flex-wrap">
          <a href="index.html" class="btn-soft">🏠 Home</a>
          <a href="admin dashboard.html" class="btn-soft">Admin Dashboard 🏠</a>
        </div>
      </div>
    </div>
  </header>

  <main class="container py-5">
    <div id="loginGate" class="lock-box">
      <h3 class="fw-bold mb-3">Admin Login</h3>
      <div class="mb-3">
        <label class="form-label">Admin Username</label>
        <input type="text" id="adminUser" class="form-control" placeholder="admin">
      </div>
      <div class="mb-3">
        <label class="form-label">Admin Password</label>
        <input type="password" id="adminPass" class="form-control" placeholder="password">
      </div>
      <button class="save-btn" onclick="adminLogin()">Login</button>
      <p class="small-note mt-3 mb-0">Default: anandh / ar@123</p>
    </div>

    <div id="adminPanel" class="d-none">
      <div class="glass p-4 p-md-5 rounded-5">
        <div class="section-label">Admin Configuration</div>
        <div class="panel mb-4">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Store Name</label>
              <input id="storeName" type="text" class="form-control" placeholder="Disability Care Hub">
            </div>
            <div class="col-md-6">
              <label class="form-label">Store Tagline</label>
              <input id="storeTagline" type="text" class="form-control" placeholder="Care products and services">
            </div>
            <div class="col-md-6">
              <label class="form-label">Admin UPI ID</label>
              <input id="upiId" type="text" class="form-control" placeholder="adminupi@bank">
            </div>
            <div class="col-md-6">
              <label class="form-label">Payment Note</label>
              <input id="paymentNote" type="text" class="form-control" placeholder="Order Payment">
            </div>
            <div class="col-md-4">
              <label class="form-label">Delivery Charge</label>
              <input id="deliveryCharge" type="number" class="form-control" min="0">
            </div>
            <div class="col-md-4">
              <label class="form-label">Free Delivery Above</label>
              <input id="freeDeliveryAbove" type="number" class="form-control" min="0">
            </div>
            <div class="col-md-4">
              <label class="form-label">Currency</label>
              <input id="currency" type="text" class="form-control" value="INR">
            </div>
            <div class="col-md-6">
              <label class="form-label">WhatsApp Number</label>
              <input id="whatsappNumber" type="text" class="form-control" placeholder="919876543210">
            </div>
            <div class="col-md-6">
              <label class="form-label">Support Number</label>
              <input id="supportNumber" type="text" class="form-control" placeholder="919876543210">
            </div>
            <div class="col-md-6">
              <label class="form-label">Order Prefix</label>
              <input id="orderPrefix" type="text" class="form-control" value="DCH">
            </div>
            <div class="col-md-6">
              <label class="form-label">Last Order Number</label>
              <input id="lastOrder" type="number" class="form-control" value="1000">
            </div>
          </div>
        </div>

        <div class="section-label">Enable / Disable</div>
        <div class="panel mb-4">
          <div class="row g-3">
            <div class="col-md-3">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="codEnabled">
                <label class="form-check-label" for="codEnabled">COD Enabled</label>
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="upiEnabled">
                <label class="form-check-label" for="upiEnabled">UPI Enabled</label>
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="showQrCode">
                <label class="form-check-label" for="showQrCode">Show QR Code</label>
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="autoWhatsAppConfirm">
                <label class="form-check-label" for="autoWhatsAppConfirm">Auto WhatsApp Confirm</label>
              </div>
            </div>
          </div>
        </div>

        <div class="section-label">Theme Colors</div>
        <div class="panel mb-4">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Primary Color</label>
              <input id="primaryColor" type="color" class="form-control form-control-color w-100">
            </div>
            <div class="col-md-4">
              <label class="form-label">Secondary Color</label>
              <input id="secondaryColor" type="color" class="form-control form-control-color w-100">
            </div>
            <div class="col-md-4">
              <label class="form-label">Accent Color</label>
              <input id="accentColor" type="color" class="form-control form-control-color w-100">
            </div>
          </div>
        </div>

        <div class="section-label">Store Preview</div>
        <div class="panel mb-4">
          <div class="preview-box">
            <div id="previewStoreName" class="fw-bold fs-5">-</div>
            <div id="previewTagline" class="small-note">-</div>
            <div class="small-note mt-2">UPI: <span id="previewUpi">-</span></div>
            <div class="small-note">Delivery Charge: ₹<span id="previewDelivery">0</span></div>
            <div class="small-note">Order Prefix: <span id="previewPrefix">DCH</span></div>
          </div>
        </div>

        <div class="row g-3">
          <div class="col-md-6">
            <button class="save-btn" onclick="saveAdminSettings()">Save Settings</button>
          </div>
          <div class="col-md-6">
            <button class="reset-btn" onclick="resetSettings()">Reset Defaults</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const defaultSettings = {
      storeName: 'Disability Care Hub',
      storeTagline: 'Care products and services',
      upiId: 'adminupi@bank',
      deliveryCharge: 50,
      freeDeliveryAbove: 1000,
      currency: 'INR',
      whatsappNumber: '7502870211',
      supportNumber: '7502870211',
      orderPrefix: 'DCH',
      lastOrder: 1000,
      codEnabled: true,
      upiEnabled: true,
      showQrCode: true,
      saveOrders: true,
      autoWhatsAppConfirm: true,
      paymentNote: 'Order Payment',
      addressLabel: 'Delivery Address',
      notesLabel: 'Order Notes',
      theme: {
        primary: '#FF6B9D',
        secondary: '#6C5CE7',
        accent: '#C4456F'
      }
    };

    function adminLogin() {
      const u = document.getElementById('adminUser').value.trim();
      const p = document.getElementById('adminPass').value.trim();
      if (u === 'admin' && p === 'admin123') {
        localStorage.setItem('disabilitycare_admin_logged_in', 'true');
        document.getElementById('loginGate').classList.add('d-none');
        document.getElementById('adminPanel').classList.remove('d-none');
        loadSettings();
      } else {
        alert('Invalid admin login');
      }
    }

    function isAdminLoggedIn() {
      return localStorage.getItem('disabilitycare_admin_logged_in') === 'true';
    }

    function bindPreview() {
      const ids = ['storeName','storeTagline','upiId','deliveryCharge','orderPrefix'];
      ids.forEach(id => document.getElementById(id).addEventListener('input', updatePreview));
      ['codEnabled','upiEnabled','showQrCode','autoWhatsAppConfirm'].forEach(id => document.getElementById(id).addEventListener('change', updatePreview));
    }

    function getFormSettings() {
      return {
        storeName: document.getElementById('storeName').value.trim(),
        storeTagline: document.getElementById('storeTagline').value.trim(),
        upiId: document.getElementById('upiId').value.trim(),
        deliveryCharge: Number(document.getElementById('deliveryCharge').value || 0),
        freeDeliveryAbove: Number(document.getElementById('freeDeliveryAbove').value || 0),
        currency: document.getElementById('currency').value.trim() || 'INR',
        whatsappNumber: document.getElementById('whatsappNumber').value.trim(),
        supportNumber: document.getElementById('supportNumber').value.trim(),
        orderPrefix: document.getElementById('orderPrefix').value.trim() || 'DCH',
        lastOrder: Number(document.getElementById('lastOrder').value || 1000),
        codEnabled: document.getElementById('codEnabled').checked,
        upiEnabled: document.getElementById('upiEnabled').checked,
        showQrCode: document.getElementById('showQrCode').checked,
        saveOrders: true,
        autoWhatsAppConfirm: document.getElementById('autoWhatsAppConfirm').checked,
        paymentNote: document.getElementById('paymentNote').value.trim(),
        addressLabel: 'Delivery Address',
        notesLabel: 'Order Notes',
        theme: {
          primary: document.getElementById('primaryColor').value,
          secondary: document.getElementById('secondaryColor').value,
          accent: document.getElementById('accentColor').value
        }
      };
    }

    function loadSettings() {
      const settings = JSON.parse(localStorage.getItem('disabilitycare_admin_settings')) || defaultSettings;

      document.getElementById('storeName').value = settings.storeName || '';
      document.getElementById('storeTagline').value = settings.storeTagline || '';
      document.getElementById('upiId').value = settings.upiId || '';
      document.getElementById('deliveryCharge').value = settings.deliveryCharge ?? 0;
      document.getElementById('freeDeliveryAbove').value = settings.freeDeliveryAbove ?? 0;
      document.getElementById('currency').value = settings.currency || 'INR';
      document.getElementById('whatsappNumber').value = settings.whatsappNumber || '';
      document.getElementById('supportNumber').value = settings.supportNumber || '';
      document.getElementById('orderPrefix').value = settings.orderPrefix || 'DCH';
      document.getElementById('lastOrder').value = settings.lastOrder ?? 1000;
      document.getElementById('codEnabled').checked = !!settings.codEnabled;
      document.getElementById('upiEnabled').checked = !!settings.upiEnabled;
      document.getElementById('showQrCode').checked = !!settings.showQrCode;
      document.getElementById('autoWhatsAppConfirm').checked = !!settings.autoWhatsAppConfirm;
      document.getElementById('paymentNote').value = settings.paymentNote || '';
      document.getElementById('primaryColor').value = settings.theme?.primary || '#FF6B9D';
      document.getElementById('secondaryColor').value = settings.theme?.secondary || '#6C5CE7';
      document.getElementById('accentColor').value = settings.theme?.accent || '#C4456F';

      updatePreview();
    }

    function saveAdminSettings() {
      const settings = getFormSettings();
      localStorage.setItem('disabilitycare_admin_settings', JSON.stringify(settings));
      localStorage.setItem('lastOrder', String(settings.lastOrder));
      alert('✅ Admin settings saved');
      updatePreview();
    }

    function resetSettings() {
      if (!confirm('Reset settings to default?')) return;
      localStorage.setItem('disabilitycare_admin_settings', JSON.stringify(defaultSettings));
      localStorage.setItem('lastOrder', String(defaultSettings.lastOrder));
      loadSettings();
      alert('✅ Reset done');
    }

    function updatePreview() {
      const s = getFormSettings();
      document.getElementById('previewStoreName').textContent = s.storeName || '-';
      document.getElementById('previewTagline').textContent = s.storeTagline || '-';
      document.getElementById('previewUpi').textContent = s.upiId || '-';
      document.getElementById('previewDelivery').textContent = s.deliveryCharge || 0;
      document.getElementById('previewPrefix').textContent = s.orderPrefix || 'DCH';
    }

    bindPreview();
    if (isAdminLoggedIn()) {
      document.getElementById('loginGate').classList.add('d-none');
      document.getElementById('adminPanel').classList.remove('d-none');
      loadSettings();
    }
  </script>
</body>
</html>
