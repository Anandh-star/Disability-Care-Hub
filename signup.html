<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disability Care Hub - Register 🏠</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Poppins', sans-serif; }
    .glass { background: rgba(255,255,255,0.14); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
    .fadeIn { animation: fadeIn 0.6s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-500 via-rose-500 to-indigo-500 text-white">

  <div class="min-h-screen flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-6xl grid lg:grid-cols-2 rounded-[2rem] overflow-hidden shadow-2xl border border-white/10 fadeIn">
      
      <!-- Left Side: Image & Stats -->
      <div class="relative p-10 lg:p-14 bg-[url('https://images.unsplash.com/photo-1581056771107-24966d0759e8?auto=format&fit=crop&w=1200&q=80')] bg-cover bg-center">
        <div class="absolute inset-0 bg-gradient-to-br from-pink-600/85 via-rose-600/75 to-indigo-900/80"></div>
        <div class="relative z-10 h-full flex flex-col justify-between">
          <div>
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/10 border border-white/15 text-sm">
              <span class="w-2.5 h-2.5 rounded-full bg-emerald-400"></span>
              Disability Care Hub 🏠
            </div>
            <h1 class="mt-8 text-4xl lg:text-6xl font-extrabold leading-tight">
              Create your profile and make life easier.
            </h1>
            <p class="mt-5 text-white/80 text-base lg:text-lg max-w-xl">
              Sign up once and get adaptive clothes, hearing aids, vision aids, mobility accessories & fun games!
            </p>
          </div>

          <div class="grid grid-cols-3 gap-3 mt-10 max-w-xl">
            <div class="glass rounded-2xl p-4 border border-white/10">
              <div class="text-2xl font-bold">10K+</div>
              <div class="text-white/70 text-sm">Users</div>
            </div>
            <div class="glass rounded-2xl p-4 border border-white/10">
              <div class="text-2xl font-bold">5K+</div>
              <div class="text-white/70 text-sm">Products</div>
            </div>
            <div class="glass rounded-2xl p-4 border border-white/10">
              <div class="text-2xl font-bold">500+</div>
              <div class="text-white/70 text-sm">Services</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Side: Register Form -->
      <div class="bg-white text-slate-900 p-8 lg:p-12">
        <div class="flex items-center justify-between mb-8">
          <div>
            <h2 class="text-3xl font-extrabold">Register </h2>
            <p class="text-slate-500 mt-1">Create your account in minutes</p>
          </div>
          <a href="login.html" class="text-sm text-pink-600 font-semibold bg-pink-50 px-4 py-2 rounded-full">
            Login
          </a>
        </div>

        <form id="signupForm" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          
          <!-- Full Name -->
          <div class="sm:col-span-2">
            <label class="block text-sm font-medium mb-2">Full Name</label>
            <input id="name" required class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:ring-4 focus:ring-pink-100 focus:border-pink-500" placeholder="Enter your name" />
          </div>

          <!-- Email -->
          <div>
            <label class="block text-sm font-medium mb-2">Email</label>
            <input id="email" type="email" required class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:ring-4 focus:ring-pink-100 focus:border-pink-500" placeholder="you@example.com" />
          </div>

          <!-- Mobile -->
          <div>
            <label class="block text-sm font-medium mb-2">Mobile Number</label>
            <input id="phone" required class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:ring-4 focus:ring-pink-100 focus:border-pink-500" placeholder="9876543210" />
          </div>

          <!-- Password -->
          <div>
            <label class="block text-sm font-medium mb-2">Password</label>
            <input id="password" type="password" required class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:ring-4 focus:ring-pink-100 focus:border-pink-500" placeholder="Create password" />
          </div>

          <!-- Disability Type (New for Disability Care Hub) -->
          <div>
            <label class="block text-sm font-medium mb-2">Disability Type</label>
            <select id="disability" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:ring-4 focus:ring-pink-100 focus:border-pink-500">
              <option value="None">None</option>
              <option value="Mobility">Mobility Disability</option>
              <option value="Vision">Vision Disability</option>
              <option value="Hearing">Hearing Disability</option>
              <option value="Cognitive">Cognitive Disability</option>
              <option value="Elderly">Elderly (Limited Mobility)</option>
            </select>
          </div>

          <!-- Age (New) -->
          <div>
            <label class="block text-sm font-medium mb-2">Age</label>
            <input id="age" type="number" required class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:ring-4 focus:ring-pink-100 focus:border-pink-500" placeholder="25" min="1" max="120" />
          </div>

          <!-- Address (Full Span) -->
          <div class="sm:col-span-2">
            <label class="block text-sm font-medium mb-2">Address</label>
            <input id="address" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:ring-4 focus:ring-pink-100 focus:border-pink-500" placeholder="Chennai, Tamil Nadu" />
          </div>

          <!-- Terms & Privacy -->
          <div class="sm:col-span-2 flex items-start gap-3">
            <input id="agree" type="checkbox" required class="mt-1 accent-pink-600" />
            <p class="text-sm text-slate-600">I agree to the terms and privacy policy.</p>
          </div>

          <!-- Submit Button -->
          <div class="sm:col-span-2">
            <button type="submit" class="w-full rounded-2xl bg-gradient-to-r from-pink-600 to-rose-600 text-white font-semibold py-3.5 shadow-lg shadow-pink-200 hover:scale-[1.01] transition">
              Create Account ✨
            </button>
          </div>

          <!-- Message -->
          <p id="msg" class="sm:col-span-2 text-sm text-center text-slate-500"></p>
        </form>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('signupForm');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const userData = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        password: document.getElementById('password').value.trim(),
        disability: document.getElementById('disability').value,
        age: document.getElementById('age').value,
        address: document.getElementById('address').value.trim(),
        createdAt: new Date().toISOString()
      };

      // Get existing users from localStorage (JSON)
      const users = JSON.parse(localStorage.getItem('disabilitycare_users')) || [];

      // Check if email already exists
      const exists = users.some(u => u.email === userData.email);
      if (exists) {
        msg.className = "sm:col-span-2 text-sm text-center text-red-600 font-medium";
        msg.textContent = "This email already exists. Please login.";
        return;
      }

      // Add new user
      users.push(userData);
      localStorage.setItem('disabilitycare_users', JSON.stringify(users));

      // Success message
      msg.className = "sm:col-span-2 text-sm text-center text-emerald-600 font-medium";
      msg.textContent = "Account created successfully! Redirecting to login...";

      // Auto redirect to login page after 1.2 seconds
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1200);
    });
  </script>
</body>
</html>
