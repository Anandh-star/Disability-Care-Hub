<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disability Care Hub - Admin Orders</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
    body {
      min-height:100vh;
      background: linear-gradient(135deg, #FF6B9D 0%, #C4456F 25%, #4A69BD 55%, #6C5CE7 100%);
      background-size:400% 400%;
      animation: gradientShift 15s ease infinite;
      color:#fff;
    }
    @keyframes gradientShift {
      0% { background-position:0% 50%; }
      50% { background-position:100% 50%; }
      100% { background-position:0% 50%; }
    }
    .topbar {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,0.18);
      padding: 22px 0;
    }
    .brand { font-size: 30px; font-weight: 800; }
    .subtitle { color: rgba(255,255,255,0.82); font-size: 15px; margin-top: 4px; }
    .glass {
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
      border-radius: 30px;
    }
    .btn-soft {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
      border-radius: 18px;
      padding: 12px 18px;
      transition: 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }
    .btn-soft:hover { background: rgba(255,255,255,0.22); color:#fff; transform: translateY(-2px); }
    .stat-card {
      background: rgba(255,255,255,0.96);
      color:#222;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      height: 100%;
    }
    .stat-icon {
      width: 54px; height: 54px; border-radius: 16px;
      display:flex; align-items:center; justify-content:center;
      font-size: 22px; color:#fff; margin-bottom: 12px;
      background: linear-gradient(135deg, #FF6B9D 0%, #6C5CE7 100%);
    }
    .stat-number { font-size: 30px; font-weight: 800; color:#333; line-height: 1; }
    .stat-label { color:#666; font-size: 13px; margin-top: 6px; }
    .panel {
      background: rgba(255,255,255,0.96);
      color:#222;
      border-radius: 26px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .control-input, .control-select {
      border-radius: 16px;
      padding: 12px 16px;
      border: 1px solid #ddd;
    }
    .order-card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }
    .order-head { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start; }
    .order-id { font-size: 18px; font-weight: 800; color:#333; }
    .order-date { font-size: 12px; color:#777; }
    .badge-soft {
      display:inline-flex; align-items:center; gap:6px;
      padding: 8px 12px; border-radius: 999px; font-size: 12px; font-weight:700;
      background: rgba(108,92,231,0.1); color:#6C5CE7;
    }
    .badge-green { background: rgba(20,184,114,0.12); color:#0f9f57; }
    .badge-orange { background: rgba(249,115,22,0.12); color:#c45a06; }
    .badge-blue { background: rgba(59,130,246,0.12); color:#2563eb; }
    .small-meta { font-size: 13px; color:#666; }
    .item-chip {
      display:inline-block; padding:6px 10px; border-radius:999px;
      background:#f6f6f6; font-size:12px; margin:4px 6px 0 0;
    }
    .action-btn {
      border:none; border-radius:14px; padding:10px 14px; font-weight:700;
      transition:0.25s ease;
    }
    .btn-view { background:#6C5CE7; color:#fff; }
    .btn-whatsapp { background:#25D366; color:#fff; }
    .btn-paid { background:#14b872; color:#fff; }
    .btn-delivered { background:#FF6B9D; color:#fff; }
    .btn-delete { background:#ef4444; color:#fff; }
    .action-btn:hover { transform: translateY(-2px); opacity: .95; }
    .empty-box {
      background: rgba(255,255,255,0.96);
      color:#222;
      border-radius: 26px;
      padding: 50px 20px;
      text-align:center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .empty-icon { font-size: 72px; margin-bottom: 14px; }
    .modal-content { border-radius: 24px; }
    .modal-header, .modal-body { color:#222; }
    .detail-line {
      display:flex; justify-content:space-between; gap:16px;
      padding:10px 0; border-bottom:1px solid #eee;
    }
    .detail-line .label { font-weight:700; color:#6C5CE7; }
    .detail-line .value { text-align:right; word-break:break-word; }
    .pdf-btn {
      background: linear-gradient(135deg, #FF6B9D 0%, #C4456F 50%, #6C5CE7 100%);
      color:#fff; border:none; border-radius:18px; padding:12px 18px; font-weight:800;
    }
    .top-actions { display:flex; gap:10px; flex-wrap:wrap; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
        <div>
          <div class="brand">📦 Manage Orders</div>
          <div class="subtitle">Track, update and export customer orders</div>
        </div>
        <div class="top-actions">
          <a href="admin Settings.html" class="btn-soft">⚙️ Settings</a>
          <a href="admin dashboard.html" class="btn-soft">🏠 Dashboard</a>
          <button class="pdf-btn" onclick="downloadPDF()">⬇️ Download PDF</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container py-5">
    <div class="glass p-4 p-md-5">
      <div class="row g-3 mb-4">
        <div class="col-md-3"><div class="stat-card"><div class="stat-icon"><i class="fa-solid fa-box"></i></div><div class="stat-number" id="totalOrders">0</div><div class="stat-label">Total Orders</div></div></div>
        <div class="col-md-3"><div class="stat-card"><div class="stat-icon"><i class="fa-solid fa-clock"></i></div><div class="stat-number" id="pendingOrders">0</div><div class="stat-label">Pending</div></div></div>
        <div class="col-md-3"><div class="stat-card"><div class="stat-icon"><i class="fa-solid fa-money-bill"></i></div><div class="stat-number" id="paidOrders">0</div><div class="stat-label">Paid</div></div></div>
        <div class="col-md-3"><div class="stat-card"><div class="stat-icon"><i class="fa-brands fa-whatsapp"></i></div><div class="stat-number" id="codOrders">0</div><div class="stat-label">COD</div></div></div>
      </div>

      <div class="panel mb-4">
        <div class="row g-3">
          <div class="col-md-5">
            <input type="text" id="searchInput" class="form-control control-input" placeholder="Search Order ID / Customer Name / Phone">
          </div>
          <div class="col-md-3">
            <select id="filterPayment" class="form-select control-select">
              <option value="">All Payment Methods</option>
              <option value="Cash On Delivery">Cash On Delivery</option>
              <option value="UPI Payment">UPI Payment</option>
            </select>
          </div>
          <div class="col-md-2">
            <select id="filterStatus" class="form-select control-select">
              <option value="">All Status</option>
              <option value="confirmed">Confirmed</option>
              <option value="paid">Paid</option>
              <option value="delivered">Delivered</option>
              <option value="payment_pending">Payment Pending</option>
            </select>
          </div>
          <div class="col-md-2 d-grid">
            <button class="pdf-btn" onclick="renderOrders()">Refresh</button>
          </div>
        </div>
      </div>

      <div id="ordersContainer"></div>
      <div id="emptyState" class="empty-box d-none">
        <div class="empty-icon">🧾</div>
        <h3 class="fw-bold">No orders found</h3>
        <p class="mb-0">Orders will appear here once customers place them.</p>
      </div>
    </div>
  </main>

  <div class="modal fade" id="orderModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold">Order Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script>
    let orders = [];

    function esc(str) {
      return String(str || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }

    function loadOrders() {
      orders = JSON.parse(localStorage.getItem('disabilitycare_orders')) || [];
      orders.sort((a, b) => new Date(b.orderDateTime) - new Date(a.orderDateTime));
    }

    function getBadgeClass(status) {
      if (status === 'paid') return 'badge-green';
      if (status === 'confirmed') return 'badge-blue';
      if (status === 'delivered') return 'badge-green';
      return 'badge-orange';
    }

    function renderStats() {
      document.getElementById('totalOrders').textContent = orders.length;
      document.getElementById('pendingOrders').textContent = orders.filter(o => o.status === 'payment_pending' || o.status === 'confirmed').length;
      document.getElementById('paidOrders').textContent = orders.filter(o => o.status === 'paid').length;
      document.getElementById('codOrders').textContent = orders.filter(o => o.paymentMethod === 'Cash On Delivery').length;
    }

    function renderOrders() {
      loadOrders();
      const search = document.getElementById('searchInput').value.trim().toLowerCase();
      const payment = document.getElementById('filterPayment').value;
      const status = document.getElementById('filterStatus').value;

      const filtered = orders.filter(order => {
        const matchSearch =
          (order.orderId || '').toLowerCase().includes(search) ||
          (order.customerName || '').toLowerCase().includes(search) ||
          (order.whatsappNumber || '').toLowerCase().includes(search);

        const matchPayment = !payment || order.paymentMethod === payment;
        const matchStatus = !status || order.status === status;

        return matchSearch && matchPayment && matchStatus;
      });

      renderStats();

      const container = document.getElementById('ordersContainer');
      const empty = document.getElementById('emptyState');

      if (!filtered.length) {
        container.innerHTML = '';
        empty.classList.remove('d-none');
        return;
      }

      empty.classList.add('d-none');
      container.innerHTML = filtered.map(order => {
        const badgeClass = getBadgeClass(order.status);
        const items = (order.items || []).slice(0, 3).map(i => `<span class="item-chip">${esc(i.name)} x${i.qty || 1}</span>`).join('');
        return `
          <div class="order-card">
            <div class="order-head mb-3">
              <div>
                <div class="order-id">${esc(order.orderId)}</div>
                <div class="order-date">${order.orderDateTime ? new Date(order.orderDateTime).toLocaleString() : '-'}</div>
              </div>
              <div class="d-flex flex-column gap-2 align-items-start align-items-md-end">
                <span class="badge-soft ${badgeClass}">${esc(order.paymentMethod)} • ${esc(order.status)}</span>
                <div class="small-meta">₹${esc(order.grandTotal || 0)} • ${esc(order.customerName || '')}</div>
              </div>
            </div>
            <div class="small-meta mb-2"><strong>Phone:</strong> ${esc(order.whatsappNumber || '-')}</div>
            <div class="small-meta mb-2"><strong>Address:</strong> ${esc(order.address || '-')}</div>
            ${order.orderNotes ? `<div class="small-meta mb-2"><strong>Notes:</strong> ${esc(order.orderNotes)}</div>` : ''}
            <div class="mb-3">${items}</div>
            <div class="d-flex flex-wrap gap-2">
              <button class="action-btn btn-view" onclick="viewOrder('${esc(order.orderId)}')">View</button>
              <button class="action-btn btn-whatsapp" onclick="openWhatsApp('${esc(order.whatsappNumber)}', '${esc(order.orderId)}')">WhatsApp</button>
              <button class="action-btn btn-paid" onclick="updateStatus('${esc(order.orderId)}', 'paid')">Mark Paid</button>
              <button class="action-btn btn-delivered" onclick="updateStatus('${esc(order.orderId)}', 'delivered')">Delivered</button>
              <button class="action-btn btn-delete" onclick="deleteOrder('${esc(order.orderId)}')">Delete</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function saveOrders(nextOrders) {
      localStorage.setItem('disabilitycare_orders', JSON.stringify(nextOrders));
      renderOrders();
    }

    function updateStatus(orderId, newStatus) {
      const idx = orders.findIndex(o => o.orderId === orderId);
      if (idx === -1) return;
      orders[idx].status = newStatus;
      saveOrders(orders);
    }

    function deleteOrder(orderId) {
      if (!confirm('Delete this order?')) return;
      orders = orders.filter(o => o.orderId !== orderId);
      saveOrders(orders);
    }

    function openWhatsApp(phone, orderId) {
      const digits = String(phone || '').replace(/\D/g, '');
      if (!digits) return alert('Invalid phone number');
      const msg = encodeURIComponent(`Hello, your order ${orderId} has been updated.`);
      window.open(`https://wa.me/${digits}?text=${msg}`, '_blank');
    }

    function viewOrder(orderId) {
      const order = orders.find(o => o.orderId === orderId);
      if (!order) return;

      const items = (order.items || []).map(item => `
        <div class="detail-line">
          <div class="label">${esc(item.name)} x${item.qty || 1}</div>
          <div class="value">₹${esc(item.price || 0)}</div>
        </div>
      `).join('');

      document.getElementById('modalBody').innerHTML = `
        <div class="detail-line"><span class="label">Order ID</span><span class="value">${esc(order.orderId)}</span></div>
        <div class="detail-line"><span class="label">Date</span><span class="value">${order.orderDateTime ? new Date(order.orderDateTime).toLocaleString() : '-'}</span></div>
        <div class="detail-line"><span class="label">Customer</span><span class="value">${esc(order.customerName || '-')}</span></div>
        <div class="detail-line"><span class="label">Phone</span><span class="value">${esc(order.whatsappNumber || '-')}</span></div>
        <div class="detail-line"><span class="label">Payment</span><span class="value">${esc(order.paymentMethod || '-')}</span></div>
        <div class="detail-line"><span class="label">Status</span><span class="value">${esc(order.status || '-')}</span></div>
        <div class="detail-line"><span class="label">Sub Total</span><span class="value">₹${esc(order.subTotal || 0)}</span></div>
        <div class="detail-line"><span class="label">Delivery</span><span class="value">₹${esc(order.deliveryCharge || 0)}</span></div>
        <div class="detail-line"><span class="label">Grand Total</span><span class="value">₹${esc(order.grandTotal || 0)}</span></div>
        <div class="mt-3"><strong>Items</strong>${items}</div>
      `;
      new bootstrap.Modal(document.getElementById('orderModal')).show();
    }

    function downloadPDF() {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');

      pdf.setFontSize(18);
      pdf.text('Disability Care Hub - Orders Report', 14, 15);

      pdf.setFontSize(10);
      pdf.text(`Generated: ${new Date().toLocaleString()}`, 14, 24);

      const rows = orders.map(o => [
        o.orderId || '',
        o.customerName || '',
        o.whatsappNumber || '',
        o.paymentMethod || '',
        o.status || '',
        `₹${o.grandTotal || 0}`,
        o.orderDateTime ? new Date(o.orderDateTime).toLocaleString() : ''
      ]);

      pdf.autoTable({
        startY: 32,
        head: [['Order ID', 'Customer', 'Phone', 'Payment', 'Status', 'Total', 'Date']],
        body: rows,
        styles: { fontSize: 8, cellPadding: 2 },
        headStyles: { fillColor: [108, 92, 231] }
      });

      pdf.save('orders-report.pdf');
    }

    document.getElementById('searchInput').addEventListener('input', renderOrders);
    document.getElementById('filterPayment').addEventListener('change', renderOrders);
    document.getElementById('filterStatus').addEventListener('change', renderOrders);

    renderOrders();
  </script>
</body>
</html>
