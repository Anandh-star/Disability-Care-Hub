<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disability Care Hub - Cart 🛒</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #FF6B9D 0%, #C4456F 25%, #4A69BD 55%, #6C5CE7 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      color: #fff;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .topbar {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,0.18);
      padding: 22px 0;
    }

    .brand { font-size: 30px; font-weight: 800; }
    .subtitle { color: rgba(255,255,255,0.82); font-size: 15px; margin-top: 4px; }

    .glass {
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
    }

    .btn-soft {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
      border-radius: 18px;
      padding: 12px 22px;
      transition: 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-soft:hover {
      background: rgba(255,255,255,0.22);
      color: #fff;
      transform: translateY(-2px);
    }

    .page-title { font-size: 30px; font-weight: 800; margin-bottom: 8px; }
    .page-desc { color: rgba(255,255,255,0.8); font-size: 14px; }

    .cart-shell { border-radius: 30px; padding: 30px; }

    .cart-item {
      background: rgba(255,255,255,0.96);
      color: #222;
      border-radius: 26px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      transition: 0.3s ease;
      margin-bottom: 18px;
    }

    .cart-item:hover { transform: translateY(-4px); }

    .cart-thumb {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 18px;
      background: #f5f5f5;
    }

    .cart-icon-box {
      width: 110px;
      height: 110px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      background: linear-gradient(135deg, rgba(255,107,157,0.12), rgba(108,92,231,0.12));
    }

    .item-title { font-size: 20px; font-weight: 800; color: #333; margin-bottom: 6px; }
    .item-meta { font-size: 13px; color: #777; margin-bottom: 8px; }
    .item-desc { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 10px; }

    .price {
      font-size: 22px;
      font-weight: 800;
      color: #C4456F;
    }

    .type-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
      background: rgba(108,92,231,0.1);
      color: #6C5CE7;
    }

    .qty-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 14px;
      font-weight: 800;
      background: #6C5CE7;
      color: #fff;
    }

    .qty-num {
      min-width: 44px;
      text-align: center;
      font-weight: 800;
      font-size: 16px;
      color: #333;
    }

    .summary {
      background: rgba(255,255,255,0.96);
      color: #222;
      border-radius: 26px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      position: sticky;
      top: 20px;
    }

    .summary-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 18px;
      color: #333;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      color: #555;
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #eee;
      padding-top: 14px;
      margin-top: 14px;
      font-size: 22px;
      font-weight: 800;
      color: #333;
    }

    .checkout-btn {
      background: linear-gradient(135deg, #FF6B9D 0%, #C4456F 50%, #6C5CE7 100%);
      color: white;
      border: none;
      border-radius: 18px;
      padding: 14px 22px;
      font-weight: 800;
      width: 100%;
      margin-top: 18px;
    }

    .clear-btn {
      background: linear-gradient(135deg, #FF4444 0%, #FF6B6B 100%);
      color: white;
      border: none;
      border-radius: 18px;
      padding: 12px 18px;
      font-weight: 700;
      width: 100%;
      margin-top: 10px;
    }

    .empty-state {
      text-align: center;
      padding: 70px 20px;
      color: rgba(255,255,255,0.72);
    }

    .empty-icon { font-size: 80px; margin-bottom: 16px; }
    .empty-title { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
    .empty-text { font-size: 14px; }

    .section-label {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
        <div>
          <div class="brand">🛒 Cart</div>
          <div class="subtitle">Products and booked services in one place</div>
        </div>
        <div class="d-flex gap-3 flex-wrap">
          <a href="index.html" class="btn-soft">🏠 Home</a>
          <a href="products.html" class="btn-soft">🛍️ Products</a>
          <a href="service.html" class="btn-soft">⚙️ Services</a>
        </div>
      </div>
    </div>
  </header>

  <main class="container py-5">
    <div class="row g-4">
      <div class="col-lg-8">
        <div class="glass cart-shell">
          <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
            <div>
              <h1 class="page-title">Your Cart 🧾</h1>
              <p class="page-desc">All selected products and booked services will appear here.</p>
            </div>
            <button class="btn btn-danger rounded-4 px-4 fw-bold" onclick="logout()">🚪 Logout</button>
          </div>

          <div class="section-label">Items</div>
          <div id="cartList"></div>

          <div id="emptyCart" class="empty-state d-none">
            <div class="empty-icon">🛒</div>
            <div class="empty-title">Cart is empty</div>
            <div class="empty-text">Add products or book services to continue.</div>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="summary">
          <div class="summary-title">Order Summary</div>
          <div class="summary-row"><span>Items</span><span id="itemCount">0</span></div>
          <div class="summary-row"><span>Products</span><span id="productCount">0</span></div>
          <div class="summary-row"><span>Services</span><span id="serviceCount">0</span></div>
          <div class="summary-total"><span>Total</span><span id="cartTotal">₹0</span></div>
          <button class="checkout-btn" onclick="goToCheckout()">💳 Checkout</button>
          <button class="clear-btn" onclick="clearCart()">🗑️ Clear Cart</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const PRODUCT_CART_KEY = 'disabilitycare_cart';
    const SERVICE_CART_KEY = 'disabilitycare_services_cart';

    function esc(str) {
      return String(str || '')
        .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }

    function getJSON(key) {
      try {
        return JSON.parse(localStorage.getItem(key)) || [];
      } catch {
        return [];
      }
    }

    function setJSON(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function getCurrentUserCartKey() {
      const savedUser = localStorage.getItem('disabilitycare_currentUser');
      const isLoggedIn = localStorage.getItem('disabilitycare_isLoggedIn');
      if (savedUser && isLoggedIn === 'true') {
        const user = JSON.parse(savedUser);
        return `disabilitycare_cart_${user.email}`;
      }
      return PRODUCT_CART_KEY;
    }

    function getCurrentCart() {
      return getJSON(getCurrentUserCartKey());
    }

    function saveCurrentCart(cart) {
      setJSON(getCurrentUserCartKey(), cart);
      window.dispatchEvent(new Event('storage'));
    }

    function getAllItems() {
      const productCart = getCurrentCart();
      const serviceCart = getJSON(SERVICE_CART_KEY);
      return [
        ...productCart.map(item => ({ ...item, _type: 'product' })),
        ...serviceCart.map(item => ({ ...item, _type: 'service' }))
      ];
    }

    function renderCart() {
      const cartList = document.getElementById('cartList');
      const emptyCart = document.getElementById('emptyCart');

      const productCart = getCurrentCart();
      const serviceCart = getJSON(SERVICE_CART_KEY);
      const allItems = [
        ...productCart.map((item,index) => ({ ...item, _type: 'product', _realIndex:index })),
        ...serviceCart.map((item,index) => ({ ...item, _type: 'service', _realIndex:index }))
      ];

      const itemCount = allItems.length;
      const productCount = productCart.length;
      const serviceCount = serviceCart.length;
      const total = allItems.reduce((sum, item) => sum + Number(item.price || 0) * Number(item.quantity || 1), 0);

      document.getElementById('itemCount').textContent = itemCount;
      document.getElementById('productCount').textContent = productCount;
      document.getElementById('serviceCount').textContent = serviceCount;
      document.getElementById('cartTotal').textContent = `₹${total}`;

      if (!allItems.length) {
        cartList.innerHTML = '';
        emptyCart.classList.remove('d-none');
        return;
      }

      emptyCart.classList.add('d-none');

      cartList.innerHTML = allItems.map((item, index) => {
        const isProduct = item._type === 'product';
        const icon = isProduct ? '🛍️' : '⚙️';
        const typeText = isProduct ? 'Product' : 'Service';
        const title = item.name || item.serviceName || 'Item';
        const desc = item.description || item.notes || '';
        const img = item.image || '';
        const qty = Number(item.quantity || 1);
        const price = Number(item.price || 0) * qty;

        return `
          <div class="cart-item">
            <div class="row g-3 align-items-center">
              <div class="col-md-2 col-4">
                ${img ? `<img src="${esc(img)}" alt="${esc(title)}" class="cart-thumb">` : `<div class="cart-icon-box">${icon}</div>`}
              </div>
              <div class="col-md-7 col-8">
                <span class="type-badge">${typeText}</span>
                <div class="item-title">${esc(title)}</div>
                <div class="item-meta">${item.addedAt ? new Date(item.addedAt).toLocaleString() : ''}</div>
                <div class="item-desc">${esc(desc)}</div>
                <div class="d-flex align-items-center gap-2 mt-2">
                  <button class="qty-btn" onclick="changeQty('${item._type}', ${item._realIndex}, -1)">-</button>
                  <div class="qty-num">${qty}</div>
                  <button class="qty-btn" onclick="changeQty('${item._type}', ${item._realIndex}, 1)">+</button>
                </div>
              </div>
              <div class="col-md-3 text-md-end">
                <div class="price">₹${price}</div>
                <button class="btn btn-outline-danger rounded-4 mt-3" onclick="removeItem('${item._type}', ${item._realIndex})">Remove</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function changeQty(type, index, delta) {
      if (type === 'product') {
        const cart = getCurrentCart();
        const item = cart[index];
        if (!item) return;
        item.quantity = Math.max(1, Number(item.quantity || 1) + delta);
        saveCurrentCart(cart);
        renderCart();
      } else {
        const serviceCart = getJSON(SERVICE_CART_KEY);
        const item = serviceCart[index];
        if (!item) return;
        item.quantity = Math.max(1, Number(item.quantity || 1) + delta);
        setJSON(SERVICE_CART_KEY, serviceCart);
        window.dispatchEvent(new Event('storage'));
        renderCart();
      }
    }

    function removeItem(type, index) {
      if (!confirm('Remove this item?')) return;
      if (type === 'product') {
        const cart = getCurrentCart();
        cart.splice(index, 1);
        saveCurrentCart(cart);
      } else {
        const serviceCart = getJSON(SERVICE_CART_KEY);
        serviceCart.splice(index, 1);
        setJSON(SERVICE_CART_KEY, serviceCart);
        window.dispatchEvent(new Event('storage'));
      }
      renderCart();
    }

    function clearCart() {
      if (!confirm('Clear all cart items?')) return;
      localStorage.removeItem(getCurrentUserCartKey());
      localStorage.removeItem(SERVICE_CART_KEY);
      window.dispatchEvent(new Event('storage'));
      renderCart();
    }

    function goToCheckout() {
      const savedUser = localStorage.getItem('disabilitycare_currentUser');
      const isLoggedIn = localStorage.getItem('disabilitycare_isLoggedIn');

      if (!savedUser || isLoggedIn !== 'true') {
        alert('Please login first!');
        window.location.href = 'login.html';
        return;
      }

      const cart = getCurrentCart();
      if (!cart.length) {
        alert('Cart is empty!');
        return;
      }

      window.location.href = 'checkout.html';
    }

    function logout() {
      localStorage.removeItem('disabilitycare_currentUser');
      localStorage.removeItem('disabilitycare_isLoggedIn');
      localStorage.removeItem('disabilitycare_currentRole');
      window.location.href = 'index.html';
    }

    
    (function migrateOldCart() {
      const oldCart = JSON.parse(localStorage.getItem('disabilitycare_cart')) || [];
      const savedUser = localStorage.getItem('disabilitycare_currentUser');
      const isLoggedIn = localStorage.getItem('disabilitycare_isLoggedIn');

      if (!savedUser || isLoggedIn !== 'true') return;

      const user = JSON.parse(savedUser);
      const newKey = `disabilitycare_cart_${user.email}`;
      const existing = JSON.parse(localStorage.getItem(newKey)) || [];

      if (oldCart.length && !existing.length) {
        localStorage.setItem(newKey, JSON.stringify(oldCart));
      }
    })();


    document.addEventListener('DOMContentLoaded', renderCart);
    window.addEventListener('storage', renderCart);
  </script>
</body>
</html>
