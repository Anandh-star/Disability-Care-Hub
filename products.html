<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disability Care Hub - Products 🛍️</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
    body{min-height:100vh;background:linear-gradient(135deg,#FF6B9D 0%,#C4456F 25%,#4A69BD 55%,#6C5CE7 100%);background-size:400% 400%;animation:grad 15s ease infinite;color:#fff}
    @keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .glass{background:rgba(255,255,255,.14);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.18);box-shadow:0 16px 40px rgba(0,0,0,.12);border-radius:28px}
    .btn-soft{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:16px;padding:12px 18px;text-decoration:none;display:inline-block;transition:.3s}
    .btn-soft:hover{background:rgba(255,255,255,.22);color:#fff;transform:translateY(-2px)}
    .panel{background:rgba(255,255,255,.96);color:#222;border-radius:26px;padding:22px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    .control-input{border-radius:16px;padding:12px 16px;border:1px solid #ddd}
    .product-card{background:#fff;border:1px solid #eee;border-radius:24px;padding:18px;box-shadow:0 10px 25px rgba(0,0,0,.06);transition:.3s}
    .product-card:hover{transform:translateY(-6px);box-shadow:0 18px 40px rgba(108,92,231,.15)}
    .product-thumb{width:100%;height:240px;object-fit:cover;border-radius:18px;margin-bottom:14px;background:#f5f5f5}
    .badge-soft{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:700;background:rgba(108,92,231,.1);color:#6C5CE7}
    .empty-box{background:rgba(255,255,255,.96);color:#222;border-radius:26px;padding:50px 20px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    .small-meta{font-size:13px;color:#666}
    .price{font-size:22px;font-weight:800;color:#C4456F}
    .title{font-weight:800;color:#222}
  </style>
</head>
<body>
  <header class="glass py-4">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
      <div>
        <div class="fw-bold fs-3">🛍️ All Products</div>
        <div class="text-white-50">Browse all available items</div>
      </div>
      <div class="d-flex gap-2 flex-wrap">
        <a href="index.html" class="btn-soft">🏠 Home</a>
        <a href="cart.html" class="btn-soft">🛒 Cart</a>
      </div>
    </div>
  </header>

  <main class="container py-5">
    <div class="panel mb-4">
      <div class="row g-3">
        <div class="col-md-5">
          <input id="searchInput" class="form-control control-input" placeholder="Search products...">
        </div>
        <div class="col-md-3">
          <input id="filterMin" type="number" class="form-control control-input" placeholder="Min price">
        </div>
        <div class="col-md-3">
          <input id="filterMax" type="number" class="form-control control-input" placeholder="Max price">
        </div>
        <div class="col-md-1 d-grid">
          <button class="btn btn-primary rounded-4" onclick="renderProducts()">Go</button>
        </div>
      </div>
    </div>

    <div id="productsGrid" class="row g-4"></div>

    <div id="emptyState" class="empty-box d-none">
      <div class="display-1">🛍️</div>
      <h3 class="fw-bold">No products found</h3>
      <p class="mb-0">Admin add pannina products inga show aagum.</p>
    </div>
  </main>

  <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content border-0" style="border-radius:24px; overflow:hidden;">
        <div class="modal-header" style="background:linear-gradient(135deg,#FF6B9D,#6C5CE7);color:#fff;">
          <h5 class="modal-title fw-bold">Product Details</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-0">
          <div class="row g-0">
            <div class="col-md-6">
              <img id="modalProductImage" src="" alt="" style="width:100%;height:100%;min-height:320px;object-fit:cover;">
            </div>
            <div class="col-md-6 p-4">
              <span class="badge rounded-pill mb-3 px-3 py-2" style="background:rgba(108,92,231,.12);color:#6C5CE7;">Featured Product</span>
              <h3 id="modalProductName" class="fw-bold mb-2" style="color:#222;"></h3>
              <div id="modalProductPrice" class="fs-3 fw-bold mb-3" style="color:#C4456F;"></div>
              <p id="modalProductDesc" class="text-muted mb-0" style="line-height:1.8;"></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const STORAGE_KEY = 'disabilitycare_products';
    const CART_KEY = 'disabilitycare_cart';

    function esc(str) {
      return String(str || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }

    function getProducts() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function getCurrentUserCartKey() {
      const savedUser = localStorage.getItem('disabilitycare_currentUser');
      const isLoggedIn = localStorage.getItem('disabilitycare_isLoggedIn');

      if (savedUser && isLoggedIn === 'true') {
        const user = JSON.parse(savedUser);
        return `disabilitycare_cart_${user.email}`;
      }

      return CART_KEY;
    }

    function renderProducts() {
      const grid = document.getElementById('productsGrid');
      const empty = document.getElementById('emptyState');

      const search = document.getElementById('searchInput').value.trim().toLowerCase();
      const min = Number(document.getElementById('filterMin').value) || 0;
      const max = Number(document.getElementById('filterMax').value) || Infinity;

      const products = getProducts().filter(p => {
        const matchSearch = (p.name || '').toLowerCase().includes(search) || (p.description || '').toLowerCase().includes(search);
        const price = Number(p.price || 0);
        return matchSearch && price >= min && price <= max;
      });

      if (!products.length) {
        grid.innerHTML = '';
        empty.classList.remove('d-none');
        return;
      }

      empty.classList.add('d-none');
      grid.innerHTML = products.map((p, i) => `
        <div class="col-12 col-md-6 col-lg-4">
          <div class="product-card h-100">
            <img src="${esc(p.image)}" alt="${esc(p.name)}" class="product-thumb" onerror="this.src='https://via.placeholder.com/600x400?text=No+Image'">
            <span class="badge-soft mb-2"><i class="fa-solid fa-box"></i> Available</span>
            <h3 class="title fs-4 mb-2">${esc(p.name)}</h3>
            <div class="price mb-2">₹${esc(p.price)}</div>
            <p class="text-muted mb-3">${esc(p.description || '')}</p>
            <div class="d-flex gap-2">
              <button class="btn btn-success w-100 rounded-4" onclick="addToCart(${i})">Add to Cart</button>
              <button class="btn btn-outline-primary w-100 rounded-4" onclick="viewDetails(${i})">View</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function addToCart(index) {

      const products = getProducts();
      const p = products[index];

      if (!p) return;

      const cartKey = getCurrentUserCartKey();

      let cart = [];

      try {
        cart = JSON.parse(localStorage.getItem(cartKey)) || [];
      } catch {
        cart = [];
      }

      const existingProduct = cart.find(item => item.name === p.name);

      if (existingProduct) {
        existingProduct.quantity = Number(existingProduct.quantity || 1) + 1;
      } else {
        cart.push({
          name: p.name || '',
          price: Number(p.price || 0),
          image: p.image || '',
          description: p.description || '',
          quantity: 1,
          addedAt: new Date().toISOString()
        });
      }

      localStorage.setItem(cartKey, JSON.stringify(cart));
      window.dispatchEvent(new Event('storage'));
      alert('✅ Product Added To Cart');
    }

    function viewDetails(index) {
      const p = getProducts()[index];
      if (!p) return;
      document.getElementById('modalProductImage').src = p.image || 'https://via.placeholder.com/600x400?text=Product';
      document.getElementById('modalProductImage').alt = p.name || 'Product';
      document.getElementById('modalProductName').textContent = p.name || '';
      document.getElementById('modalProductPrice').textContent = `₹${p.price || 0}`;
      document.getElementById('modalProductDesc').textContent = p.description || 'No description available.';
      const modal = new bootstrap.Modal(document.getElementById('productModal'));
      modal.show();
    }

    document.getElementById('searchInput').addEventListener('input', renderProducts);
    document.getElementById('filterMin').addEventListener('input', renderProducts);
    document.getElementById('filterMax').addEventListener('input', renderProducts);

    document.addEventListener('DOMContentLoaded', renderProducts);
    window.addEventListener('storage', renderProducts);
  </script>
</body>
</html>
