<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disability Care Hub - Login 🏠</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Poppins', sans-serif; }
    .fadeIn { animation: fadeIn 0.6s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-500 via-rose-500 to-indigo-500 text-white">

  <div class="min-h-screen flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-6xl grid lg:grid-cols-2 rounded-[2rem] overflow-hidden shadow-2xl border border-white/10 fadeIn">
      
      <!-- Left Side: Image -->
      <div class="relative p-10 lg:p-14 bg-[url('https://images.unsplash.com/photo-1581056771107-24966d0759e8?auto=format&fit=crop&w=1200&q=80')] bg-cover bg-center">
        <div class="absolute inset-0 bg-gradient-to-br from-pink-600/85 via-rose-600/75 to-indigo-900/80"></div>
        <div class="relative z-10 h-full flex flex-col justify-between">
          <div>
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/10 border border-white/15 text-sm">
              <span class="w-2.5 h-2.5 rounded-full bg-emerald-400"></span>
              Disability Care Hub 🏠
            </div>
            <h1 class="mt-8 text-4xl lg:text-6xl font-extrabold leading-tight">
              Welcome Back!
            </h1>
            <p class="mt-5 text-white/80 text-base lg:text-lg max-w-xl">
              Login to access adaptive clothes, hearing aids, vision aids, mobility accessories & fun games!
            </p>
          </div>
        </div>
      </div>

      <!-- Right Side: Login Form -->
      <div class="bg-white text-slate-900 p-8 lg:p-12">
        <div class="mb-8">
          <h2 class="text-3xl font-extrabold">Sign In</h2>
          <p class="text-slate-500 mt-1">Login to continue</p>
        </div>

        <form id="loginForm" class="space-y-4">
          <div>
            <label class="block text-sm font-medium mb-2">Email</label>
            <input id="email" type="email" required class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:ring-4 focus:ring-pink-100 focus:border-pink-500" placeholder="you@example.com" />
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">Password</label>
            <input id="password" type="password" required class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:ring-4 focus:ring-pink-100 focus:border-pink-500" placeholder="Enter password" />
          </div>

          <button type="submit" class="w-full rounded-2xl bg-gradient-to-r from-pink-600 to-rose-600 text-white font-semibold py-3.5 shadow-lg shadow-pink-200 hover:scale-[1.01] transition">
            Login Now ✨
          </button>

          <p id="msg" class="text-sm text-center text-slate-500"></p>

          <div class="text-center mt-4">
            <a href="signup.html" class="text-sm text-pink-600 font-semibold">
              Don't have an account? Register
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      
      // Get users from localStorage (JSON) - Disability Care Hub specific
      const users = JSON.parse(localStorage.getItem('disabilitycare_users')) || [];

      // Admin credentials
      const admin = {
        name: "Admin",
        email: "ar@gmail.com",
        password: "1208",
        role: "Admin"
      };

      // Admin login check
      if (email === admin.email && password === admin.password) {
        localStorage.setItem('disabilitycare_currentUser', JSON.stringify(admin));
        localStorage.setItem('disabilitycare_isLoggedIn', 'true');
        localStorage.setItem('disabilitycare_currentRole', 'Admin');

        document.getElementById('msg').className = 'text-sm text-center text-emerald-600 font-medium';
        document.getElementById('msg').textContent = 'Admin login success! Redirecting to dashboard...';

        setTimeout(() => {
          window.location.href = 'admin dashboard.html';
        }, 1000);
        return;
      }

      // User login check
      const user = users.find(u => u.email === email && u.password === password);

      if (user) {
        localStorage.setItem('disabilitycare_currentUser', JSON.stringify(user));
        localStorage.setItem('disabilitycare_isLoggedIn', 'true');
        localStorage.setItem('disabilitycare_currentRole', user.role || 'Job Seeker');

        document.getElementById('msg').className = 'text-sm text-center text-emerald-600 font-medium';
        document.getElementById('msg').textContent = 'Login success! Redirecting to home page...';

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      } else {
        document.getElementById('msg').className = 'text-sm text-center text-red-600 font-medium';
        document.getElementById('msg').textContent = 'Invalid email or password.';
      }
    });
  </script>
</body>
</html>
