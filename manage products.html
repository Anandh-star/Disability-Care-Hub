<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disability Care Hub - Manage Products 🛍️</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
    body {
      min-height:100vh;
      background: linear-gradient(135deg, #FF6B9D 0%, #C4456F 25%, #4A69BD 55%, #6C5CE7 100%);
      background-size:400% 400%;
      animation: gradientShift 15s ease infinite;
      color:#fff;
    }
    @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .glass { background: rgba(255,255,255,0.14); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border:1px solid rgba(255,255,255,0.18); box-shadow: 0 16px 40px rgba(0,0,0,0.12); border-radius: 30px; }
    .btn-soft { background: rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.18); color:#fff; border-radius:18px; padding:12px 18px; text-decoration:none; display:inline-block; transition:.3s; }
    .btn-soft:hover { background: rgba(255,255,255,0.22); color:#fff; transform: translateY(-2px); }
    .panel { background: rgba(255,255,255,0.96); color:#222; border-radius:26px; padding:22px; box-shadow:0 10px 30px rgba(0,0,0,0.08); }
    .control-input { border-radius:16px; padding:12px 16px; border:1px solid #ddd; }
    .product-card {
      background:#fff; border:1px solid #eee; border-radius:22px; padding:18px; margin-bottom:16px;
      box-shadow:0 8px 20px rgba(0,0,0,0.05); transition:.3s ease;
    }
    .product-card:hover { transform: translateY(-4px); }
    .product-thumb {
      width:100%; height:220px; object-fit:cover; border-radius:18px; background:#f5f5f5; margin-bottom:14px;
    }
    .badge-soft {
      display:inline-flex; align-items:center; gap:6px; padding:8px 12px; border-radius:999px;
      font-size:12px; font-weight:700; background: rgba(108,92,231,0.1); color:#6C5CE7;
    }
    .small-meta { font-size:13px; color:#666; }
    .action-btn { border:none; border-radius:14px; padding:10px 14px; font-weight:700; transition:.25s ease; }
    .btn-edit { background:#6C5CE7; color:#fff; }
    .btn-delete { background:#ef4444; color:#fff; }
    .empty-box { background: rgba(255,255,255,0.96); color:#222; border-radius:26px; padding:50px 20px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.08); }
    .top-actions { display:flex; gap:10px; flex-wrap:wrap; }
    .animate-in { animation: cardIn .35s ease both; }
    @keyframes cardIn { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <header class="glass py-4">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
        <div>
          <div class="fw-bold fs-3">🛍️ Manage Products</div>
          <div class="text-white-50">Add, edit, delete and sync live dashboard counts</div>
        </div>
        <div class="top-actions">
          <a href="admin dashboard.html" class="btn-soft">🏠 Dashboard</a>
          <a href="index.html" class="btn-soft">Home</a>
        </div>
      </div>
    </div>
  </header>

  <main class="container py-5">
    <div class="panel mb-4">
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label class="form-label fw-bold">Product Name</label>
          <input id="name" class="form-control control-input" placeholder="Enter product name">
        </div>
        <div class="col-md-2">
          <label class="form-label fw-bold">Price</label>
          <input id="price" type="number" class="form-control control-input" placeholder="Price">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-bold">Image URL</label>
          <input id="image" class="form-control control-input" placeholder="Paste image URL">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-bold">Product Image Upload</label>
          <input id="imageFile" type="file" class="form-control control-input" accept="image/*">
        </div>
        <div class="col-md-12">
          <label class="form-label fw-bold">Description</label>
          <textarea id="description" rows="3" class="form-control control-input" placeholder="Enter product description"></textarea>
        </div>
        <div class="col-md-12 d-flex gap-2 flex-wrap">
          <button class="btn btn-success rounded-4 px-4" onclick="saveProduct()"><i class="fa-solid fa-floppy-disk me-2"></i>Save Product</button>
          <button class="btn btn-secondary rounded-4 px-4" onclick="resetForm()"><i class="fa-solid fa-rotate-left me-2"></i>Reset</button>
        </div>
      </div>
    </div>

    <div class="panel mb-4">
      <div class="row g-3">
        <div class="col-md-4">
          <input id="searchInput" class="form-control control-input" placeholder="Search products">
        </div>
        <div class="col-md-3">
          <input id="filterMin" type="number" class="form-control control-input" placeholder="Min price">
        </div>
        <div class="col-md-3">
          <input id="filterMax" type="number" class="form-control control-input" placeholder="Max price">
        </div>
        <div class="col-md-2 d-grid">
          <button class="btn btn-primary rounded-4" onclick="renderProducts()">Refresh</button>
        </div>
      </div>
    </div>

    <div id="productsContainer"></div>
    <div id="emptyState" class="empty-box d-none">
      <div class="display-1">🛍️</div>
      <h3 class="fw-bold">No products found</h3>
      <p class="mb-0">Add your first product above.</p>
    </div>
  </main>

  <script>
    const STORAGE_KEY = 'disabilitycare_products';
    let products = [];
    let editingIndex = -1;

    function esc(str) {
      return String(str || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }

    function loadProducts() {
      try {
        products = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        products = [];
      }
      renderProducts();
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        if (!file) return resolve('');
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function saveProduct() {
      const name = document.getElementById('name').value.trim();
      const price = Number(document.getElementById('price').value);
      const imageUrl = document.getElementById('image').value.trim();
      const imageFile = document.getElementById('imageFile').files[0];
      const description = document.getElementById('description').value.trim();

      if (!name || !price) {
        alert('Please enter product name and price');
        return;
      }

      let image = imageUrl;
      if (imageFile) image = await readFileAsDataURL(imageFile);
      if (!image) image = 'https://via.placeholder.com/600x400?text=Product+Image';

      const data = { name, price, image, description };

      if (editingIndex === -1) {
        products.unshift(data);
      } else {
        products[editingIndex] = data;
      }

      localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
      window.dispatchEvent(new Event('storage'));
      resetForm();
      renderProducts();
      alert(editingIndex === -1 ? 'Product added successfully' : 'Product updated successfully');
    }

    function editProduct(index) {
      const p = products[index];
      editingIndex = index;
      document.getElementById('name').value = p.name || '';
      document.getElementById('price').value = p.price || '';
      document.getElementById('image').value = p.image && p.image.startsWith('http') ? p.image : '';
      document.getElementById('description').value = p.description || '';
      document.getElementById('imageFile').value = '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteProduct(index) {
      if (!confirm('Delete this product?')) return;
      products.splice(index, 1);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
      window.dispatchEvent(new Event('storage'));
      renderProducts();
    }

    function resetForm() {
      editingIndex = -1;
      document.getElementById('name').value = '';
      document.getElementById('price').value = '';
      document.getElementById('image').value = '';
      document.getElementById('imageFile').value = '';
      document.getElementById('description').value = '';
    }

    function renderProducts() {
      const container = document.getElementById('productsContainer');
      const empty = document.getElementById('emptyState');

      const search = document.getElementById('searchInput').value.trim().toLowerCase();
      const min = Number(document.getElementById('filterMin').value) || 0;
      const max = Number(document.getElementById('filterMax').value) || Infinity;

      const filtered = products.filter(p => {
        const matchSearch = (p.name || '').toLowerCase().includes(search) || (p.description || '').toLowerCase().includes(search);
        const matchPrice = Number(p.price || 0) >= min && Number(p.price || 0) <= max;
        return matchSearch && matchPrice;
      });

      if (!filtered.length) {
        container.innerHTML = '';
        empty.classList.remove('d-none');
        return;
      }

      empty.classList.add('d-none');
      container.innerHTML = `
        <div class="row g-4">
          ${filtered.map((p) => {
            const index = products.indexOf(p);
            return `
              <div class="col-12 col-md-6 col-lg-4">
                <div class="product-card animate-in">
                  <img src="${esc(p.image)}" alt="${esc(p.name)}" class="product-thumb">
                  <span class="badge-soft mb-2"><i class="fa-solid fa-box"></i> Product</span>
                  <div class="fw-bold fs-4 text-dark">${esc(p.name)}</div>
                  <div class="small-meta mb-2">₹${esc(p.price)}</div>
                  <p class="text-muted mb-3">${esc(p.description || '')}</p>
                  <div class="d-flex gap-2">
                    <button class="action-btn btn-edit flex-fill" onclick="editProduct(${index})">Edit</button>
                    <button class="action-btn btn-delete flex-fill" onclick="deleteProduct(${index})">Delete</button>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    document.getElementById('searchInput').addEventListener('input', renderProducts);
    document.getElementById('filterMin').addEventListener('input', renderProducts);
    document.getElementById('filterMax').addEventListener('input', renderProducts);

    loadProducts();
    window.addEventListener('storage', loadProducts);
  </script>
</body>
</html>
